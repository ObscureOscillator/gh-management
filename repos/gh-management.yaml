gh-management:
  # ── General ───────────────────────────────────────────────────────────────
  description: "Used to Manage the Github Organization, Users, Repositories, etc. "
  # homepage_url: "https://example.com"
  visibility: public
  topics: []
  is_template: false
  archived: false
  archive_on_destroy: false

  # ── Features ──────────────────────────────────────────────────────────────
  has_issues: true
  has_discussions: false
  has_projects: true
  has_wiki: true

  # ── Merge strategies ──────────────────────────────────────────────────────
  allow_merge_commit: true
  allow_squash_merge: true
  allow_rebase_merge: true
  allow_auto_merge: false
  allow_forking: true
  allow_update_branch: false
  delete_branch_on_merge: false

  # ── Merge commit message ───────────────────────────────────────────────────
  # squash_merge_commit_title: PR_TITLE | COMMIT_OR_PR_TITLE
  # squash_merge_commit_message: PR_BODY | COMMIT_MESSAGES | BLANK
  # merge_commit_title: PR_TITLE | MERGE_MESSAGE
  # merge_commit_message: PR_BODY | PR_TITLE | BLANK

  # ── Security ──────────────────────────────────────────────────────────────
  web_commit_signoff_required: false

  # ── Pages ─────────────────────────────────────────────────────────────────
  # Uncomment to enable GitHub Pages.
  # pages:
  #   build_type: legacy   # legacy (branch-based) | workflow (Actions-driven)
  #   cname: docs.example.com
  #   source:              # only used when build_type: legacy
  #     branch: gh-pages
  #     path: /

  # ── Team access ───────────────────────────────────────────────────────────
  # Map of team slug -> permission: pull | triage | push | maintain | admin
  # teams:
  #   admins: admin
  #   developers: push

  # ── Environments ──────────────────────────────────────────────────────────
  # environments:
  #   production:
  #     wait_timer: 30                # minutes before deployment (0–43200)
  #     can_admins_bypass: false
  #     prevent_self_review: true
  #     reviewers:
  #       teams: [admins]             # team slugs (max 6 combined with users)
  #       users: [jared-bloomer]      # user logins
  #     deployment_branch_policy:
  #       protected_branches: true
  #       custom_branch_policies: false
  #   staging:
  #     wait_timer: 0

  # ── Security and analysis (GitHub Advanced Security) ──────────────────────
  # Requires GHAS licence for private repos; free for public repos.
  # security_and_analysis:
  #   advanced_security:
  #     status: enabled     # enabled | disabled
  #   secret_scanning:
  #     status: enabled
  #   secret_scanning_push_protection:
  #     status: enabled
