name: "Terraform: Plan"

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: "terraform-plan"
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  terraform-plan:
    name: Terraform Plan
    uses: ObscureOscillator/reusable-workflows/.github/workflows/terraform-plan.yml@v1.0.0
    with:
      environment: prod
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_ACCESS_SECRET: ${{ secrets.AWS_ACCESS_SECRET }}
